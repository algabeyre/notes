<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteFlow - Personal Note App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --primary-dark: #5a67d8;
            --secondary-color: #48bb78;
            --danger-color: #f56565;
            --warning-color: #ed8936;
            --bg-primary: #ffffff;
            --bg-secondary: #f7fafc;
            --bg-tertiary: #edf2f7;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 20px rgba(0,0,0,0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg-primary: #1a202c;
            --bg-secondary: #2d3748;
            --bg-tertiary: #4a5568;
            --text-primary: #f7fafc;
            --text-secondary: #cbd5e0;
            --border-color: #4a5568;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--bg-primary);
            box-shadow: var(--shadow-md);
            padding: 20px 0;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.95);
        }

        body.dark-mode header {
            background: rgba(26,32,44,0.95);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-bar {
            position: relative;
            flex: 1;
            max-width: 400px;
            margin: 0 30px;
        }

        .search-bar input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 2px solid var(--border-color);
            border-radius: 25px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-bar svg {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            width: 20px;
            height: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .icon-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: rotate(180deg);
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
        }

        .sidebar {
            background: var(--bg-primary);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow-md);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .sidebar h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }

        .category-item:hover {
            background: var(--bg-tertiary);
            transform: translateX(5px);
        }

        .category-item.active {
            background: var(--primary-color);
            color: white;
        }

        .category-icon {
            width: 20px;
            height: 20px;
        }

        .category-count {
            margin-left: auto;
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .category-item.active .category-count {
            background: rgba(255,255,255,0.3);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeIn 0.5s ease;
        }

        .note-card {
            background: var(--bg-primary);
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-color);
            transition: var(--transition);
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .note-card:hover::before {
            width: 100%;
            opacity: 0.1;
        }

        .note-card.pinned {
            background: linear-gradient(135deg, var(--bg-primary) 0%, #fff5f5 100%);
        }

        .note-card.pinned::before {
            background: var(--warning-color);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .note-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
            word-break: break-word;
        }

        .note-content {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .note-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .note-actions {
            display: flex;
            gap: 10px;
        }

        .note-action-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .note-action-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }

        .note-action-btn.delete:hover {
            background: var(--danger-color);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            padding: 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-primary);
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--danger-color);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
            font-family: inherit;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .stats-bar {
            background: var(--bg-primary);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: var(--shadow-md);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                order: 2;
            }

            .search-bar {
                display: none;
            }

            .header-content {
                flex-wrap: wrap;
            }

            .stats-bar {
                flex-direction: column;
                gap: 20px;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-primary);
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left: 4px solid var(--secondary-color);
        }

        .toast.error {
            border-left: 4px solid var(--danger-color);
        }

        .color-picker {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
        }

        .color-option:hover {
            transform: scale(1.2);
        }

        .color-option.selected {
            border-color: var(--text-primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                </svg>
                NoteFlow
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search notes...">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
                </svg>
            </div>
            
            <div class="header-actions">
                <button class="btn btn-primary" id="addNoteBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/>
                    </svg>
                    New Note
                </button>
                <button class="icon-btn" id="themeToggle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12,18V6A6,6 0 0,1 18,12A6,6 0 0,1 12,18M20,15.31L23.31,12L20,8.69V4H15.31L12,0.69L8.69,4H4V8.69L0.69,12L4,15.31V20H8.69L12,23.31L15.31,20H20V15.31Z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalNotes">0</div>
                <div class="stat-label">Total Notes</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="pinnedNotes">0</div>
                <div class="stat-label">Pinned</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="categoriesCount">0</div>
                <div class="stat-label">Categories</div>
            </div>
        </div>

        <div class="main-content">
            <aside class="sidebar">
                <h3>Categories</h3>
                <ul class="category-list">
                    <li class="category-item active" data-category="all">
                        <svg class="category-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3,13H5V11H3V13M3,17H5V15H3V17M3,9H5V7H3V9M7,13H21V11H7V13M7,17H21V15H7V17M7,7V9H21V7H7Z"/>
                        </svg>
                        All Notes
                        <span class="category-count">0</span>
                    </li>
                    <li class="category-item" data-category="personal">
                        <svg class="category-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12,5.5A3.5,3.5 0 0,1 15.5,9A3.5,3.5 0 0,1 12,12.5A3.5,3.5 0 0,1 8.5,9A3.5,3.5 0 0,1 12,5.5M5,8C5.56,8 6.08,8.15 6.53,8.42C6.38,9.85 6.8,11.27 7.66,12.38C7.16,13.34 6.16,14 5,14A3,3 0 0,1 2,11A3,3 0 0,1 5,8M19,8A3,3 0 0,1 22,11A3,3 0 0,1 19,14C17.84,14 16.84,13.34 16.34,12.38C17.2,11.27 17.62,9.85 17.47,8.42C17.92,8.15 18.44,8 19,8M5.5,18.19C5.5,16.54 8.38,15.19 12,15.19C15.62,15.19 18.5,16.54 18.5,18.19V20H5.5V18.19Z"/>
                        </svg>
                        Personal
                        <span class="category-count">0</span>
                    </li>
                    <li class="category-item" data-category="work">
                        <svg class="category-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20,6H16V4A2,2 0 0,0 14,2H10A2,2 0 0,0 8,4V6H4A2,2 0 0,0 2,8V19A2,2 0 0,0 4,21H20A2,2 0 0,0 22,19V8A2,2 0 0,0 20,6M10,4H14V6H10V4Z"/>
                        </svg>
                        Work
                        <span class="category-count">0</span>
                    </li>
                    <li class="category-item" data-category="ideas">
                        <svg class="category-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17,13H13V17H11V13H7V11H11V7H13V11H17M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"/>
                        </svg>
                        Ideas
                        <span class="category-count">0</span>
                    </li>
                    <li class="category-item" data-category="important">
                        <svg class="category-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12,2L14.09,8.26L20.55,9.27L16.27,13.14L17.45,19.68L12,16.27L6.55,19.68L7.73,13.14L3.45,9.27L9.91,8.26L12,2M12,15L14.94,17L14,13.5L16.5,11L12.75,10.5L12,7L11.25,10.5L7.5,11L10,13.5L9.06,17L12,15Z"/>
                        </svg>
                        Important
                        <span class="category-count">0</span>
                    </li>
                </ul>
            </aside>

            <main>
                <div class="notes-grid" id="notesGrid">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M10,12L8,14L10,16L12,14L10,12M16,14L14,12L12,14L14,16L16,14Z"/>
                        </svg>
                        <h3>No notes yet</h3>
                        <p>Create your first note to get started!</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal" id="noteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">New Note</h2>
                <button class="modal-close" id="modalClose">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="noteForm">
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-input" id="noteTitle" placeholder="Enter note title..." required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="noteCategory">
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="ideas">Ideas</option>
                            <option value="important">Important</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Color</label>
                        <div class="color-picker">
                            <div class="color-option selected" style="background: #667eea;" data-color="#667eea"></div>
                            <div class="color-option" style="background: #48bb78;" data-color="#48bb78"></div>
                            <div class="color-option" style="background: #ed8936;" data-color="#ed8936"></div>
                            <div class="color-option" style="background: #f56565;" data-color="#f56565"></div>
                            <div class="color-option" style="background: #9f7aea;" data-color="#9f7aea"></div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Content</label>
                        <textarea class="form-textarea" id="noteContent" placeholder="Write your note here..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            <input type="checkbox" id="notePinned"> Pin this note
                        </label>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Note</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        class NoteApp {
            constructor() {
                this.notes = JSON.parse(localStorage.getItem('notes')) || [];
                this.currentCategory = 'all';
                this.editingNoteId = null;
                this.selectedColor = '#667eea';
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.renderNotes();
                this.updateStats();
                this.updateCategoryCounts();
            }

            setupEventListeners() {
                // Add note button
                document.getElementById('addNoteBtn').addEventListener('click', () => this.openModal());
                
                // Modal events
                document.getElementById('modalClose').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('noteForm').addEventListener('submit', (e) => this.handleSubmit(e));
                
                // Category filter
                document.querySelectorAll('.category-item').forEach(item => {
                    item.addEventListener('click', () => this.filterByCategory(item.dataset.category));
                });
                
                // Search
                document.getElementById('searchInput').addEventListener('input', (e) => this.searchNotes(e.target.value));
                
                // Theme toggle
                document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());
                
                // Color picker
                document.querySelectorAll('.color-option').forEach(option => {
                    option.addEventListener('click', () => this.selectColor(option));
                });

                // Close modal on outside click
                document.getElementById('noteModal').addEventListener('click', (e) => {
                    if (e.target.id === 'noteModal') {
                        this.closeModal();
                    }
                });
            }

            selectColor(option) {
                document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                this.selectedColor = option.dataset.color;
            }

            openModal(noteId = null) {
                const modal = document.getElementById('noteModal');
                const modalTitle = document.getElementById('modalTitle');
                
                if (noteId) {
                    const note = this.notes.find(n => n.id === noteId);
                    if (note) {
                        modalTitle.textContent = 'Edit Note';
                        document.getElementById('noteTitle').value = note.title;
                        document.getElementById('noteContent').value = note.content;
                        document.getElementById('noteCategory').value = note.category;
                        document.getElementById('notePinned').checked = note.pinned;
                        
                        // Select color
                        document.querySelectorAll('.color-option').forEach(opt => {
                            opt.classList.remove('selected');
                            if (opt.dataset.color === note.color) {
                                opt.classList.add('selected');
                                this.selectedColor = note.color;
                            }
                        });
                        
                        this.editingNoteId = noteId;
                    }
                } else {
                    modalTitle.textContent = 'New Note';
                    document.getElementById('noteForm').reset();
                    this.editingNoteId = null;
                    // Reset color
                    document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
                    document.querySelector('.color-option').classList.add('selected');
                    this.selectedColor = '#667eea';
                }
                
                modal.classList.add('active');
            }

            closeModal() {
                document.getElementById('noteModal').classList.remove('active');
                document.getElementById('noteForm').reset();
                this.editingNoteId = null;
            }

            handleSubmit(e) {
                e.preventDefault();
                
                const title = document.getElementById('noteTitle').value.trim();
                const content = document.getElementById('noteContent').value.trim();
                const category = document.getElementById('noteCategory').value;
                const pinned = document.getElementById('notePinned').checked;
                
                if (!title || !content) {
                    this.showToast('Please fill in all fields', 'error');
                    return;
                }
                
                const noteData = {
                    title,
                    content,
                    category,
                    pinned,
                    color: this.selectedColor,
                    updatedAt: new Date().toISOString()
                };
                
                if (this.editingNoteId) {
                    const index = this.notes.findIndex(n => n.id === this.editingNoteId);
                    if (index !== -1) {
                        this.notes[index] = { ...this.notes[index], ...noteData };
                        this.showToast('Note updated successfully', 'success');
                    }
                } else {
                    noteData.id = Date.now().toString();
                    noteData.createdAt = new Date().toISOString();
                    this.notes.unshift(noteData);
                    this.showToast('Note created successfully', 'success');
                }
                
                this.saveNotes();
                this.renderNotes();
                this.updateStats();
                this.updateCategoryCounts();
                this.closeModal();
            }

            deleteNote(noteId) {
                if (confirm('Are you sure you want to delete this note?')) {
                    this.notes = this.notes.filter(n => n.id !== noteId);
                    this.saveNotes();
                    this.renderNotes();
                    this.updateStats();
                    this.updateCategoryCounts();
                    this.showToast('Note deleted successfully', 'success');
                }
            }

            togglePin(noteId) {
                const note = this.notes.find(n => n.id === noteId);
                if (note) {
                    note.pinned = !note.pinned;
                    this.saveNotes();
                    this.renderNotes();
                    this.updateStats();
                    this.showToast(note.pinned ? 'Note pinned' : 'Note unpinned', 'success');
                }
            }

            filterByCategory(category) {
                this.currentCategory = category;
                
                document.querySelectorAll('.category-item').forEach(item => {
                    item.classList.remove('active');
                    if (item.dataset.category === category) {
                        item.classList.add('active');
                    }
                });
                
                this.renderNotes();
            }

            searchNotes(query) {
                const filtered = this.notes.filter(note => {
                    const matchesSearch = note.title.toLowerCase().includes(query.toLowerCase()) ||
                                        note.content.toLowerCase().includes(query.toLowerCase());
                    const matchesCategory = this.currentCategory === 'all' || note.category === this.currentCategory;
                    return matchesSearch && matchesCategory;
                });
                
                this.renderFilteredNotes(filtered);
            }

            renderFilteredNotes(notes) {
                const grid = document.getElementById('notesGrid');
                
                if (notes.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20M10,12L8,14L10,16L12,14L10,12M16,14L14,12L12,14L14,16L16,14Z"/>
                            </svg>
                            <h3>No notes found</h3>
                            <p>Try adjusting your search or filters</p>
                        </div>
                    `;
                    return;
                }
                
                // Sort notes: pinned first, then by date
                const sorted = [...notes].sort((a, b) => {
                    if (a.pinned && !b.pinned) return -1;
                    if (!a.pinned && b.pinned) return 1;
                    return new Date(b.updatedAt) - new Date(a.updatedAt);
                });
                
                grid.innerHTML = sorted.map(note => this.createNoteCard(note)).join('');
                this.attachNoteEventListeners();
            }

            renderNotes() {
                let filtered = this.notes;
                
                if (this.currentCategory !== 'all') {
                    filtered = this.notes.filter(n => n.category === this.currentCategory);
                }
                
                this.renderFilteredNotes(filtered);
            }

            createNoteCard(note) {
                const date = new Date(note.updatedAt);
                const formattedDate = date.toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    year: 'numeric' 
                });
                
                const categoryColors = {
                    personal: '#48bb78',
                    work: '#4299e1',
                    ideas: '#9f7aea',
                    important: '#f56565'
                };
                
                return `
                    <div class="note-card ${note.pinned ? 'pinned' : ''}" data-id="${note.id}" style="border-color: ${note.color || categoryColors[note.category]}">
                        <div class="note-header">
                            <div>
                                <div class="note-title">${this.escapeHtml(note.title)}</div>
                                <span style="color: ${categoryColors[note.category]}; font-size: 0.85rem; font-weight: 600;">${note.category}</span>
                            </div>
                        </div>
                        <div class="note-content">${this.escapeHtml(note.content)}</div>
                        <div class="note-footer">
                            <span class="note-date">${formattedDate}</span>
                            <div class="note-actions">
                                <button class="note-action-btn pin-btn" data-id="${note.id}" title="${note.pinned ? 'Unpin' : 'Pin'}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="${note.pinned ? 'currentColor' : 'none'} stroke="currentColor" stroke-width="2">
                                        <path d="M12,2L14.09,8.26L20.55,9.27L16.27,13.14L17.45,19.68L12,16.27L6.55,19.68L7.73,13.14L3.45,9.27L9.91,8.26L12,2Z"/>
                                    </svg>
                                </button>
                                <button class="note-action-btn edit-btn" data-id="${note.id}" title="Edit">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/>
                                    </svg>
                                </button>
                                <button class="note-action-btn delete" data-id="${note.id}" title="Delete">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }

            attachNoteEventListeners() {
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.openModal(btn.dataset.id);
                    });
                });
                
                document.querySelectorAll('.delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.deleteNote(btn.dataset.id);
                    });
                });
                
                document.querySelectorAll('.pin-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.togglePin(btn.dataset.id);
                    });
                });
                
                document.querySelectorAll('.note-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (!e.target.closest('.note-actions')) {
                            this.openModal(card.dataset.id);
                        }
                    });
                });
            }

            updateStats() {
                document.getElementById('totalNotes').textContent = this.notes.length;
                document.getElementById('pinnedNotes').textContent = this.notes.filter(n => n.pinned).length;
                
                const categories = new Set(this.notes.map(n => n.category));
                document.getElementById('categoriesCount').textContent = categories.size;
            }

            updateCategoryCounts() {
                const counts = {
                    all: this.notes.length,
                    personal: this.notes.filter(n => n.category === 'personal').length,
                    work: this.notes.filter(n => n.category === 'work').length,
                    ideas: this.notes.filter(n => n.category === 'ideas').length,
                    important: this.notes.filter(n => n.category === 'important').length
                };
                
                document.querySelectorAll('.category-item').forEach(item => {
                    const count = item.querySelector('.category-count');
                    if (count) {
                        count.textContent = counts[item.dataset.category] || 0;
                    }
                });
            }

            toggleTheme() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDark);
            }

            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const toastMessage = document.getElementById('toastMessage');
                
                toast.className = `toast ${type}`;
                toastMessage.textContent = message;
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            saveNotes() {
                localStorage.setItem('notes', JSON.stringify(this.notes));
            }

            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }
        }

        // Initialize the app
        const app = new NoteApp();

        // Load saved theme
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
    </script>
</body>
</html>
